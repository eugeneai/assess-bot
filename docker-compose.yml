services:
  bot:
    build: .
    network_mode: "host"
    env_file: .env
    volumes:
      - ./files:/app/files
      - ./assess.db:/app/assess.db
    restart: unless-stopped
    command: python -m bot.main

  web:
    build: .
    env_file: .env
    ports:
      - "8899:8899"
    volumes:
      - ./files:/app/files
      - ./assess.db:/app/assess.db
    restart: unless-stopped
    command: uvicorn web.main:app --host 0.0.0.0 --port 8899
