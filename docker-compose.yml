services:
  bot:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    network_mode: "host"
    env_file: .env
    volumes:
      - ./bot:/app/bot
      - ./core:/app/core
      - ./services:/app/services
      - ./files:/app/files
      - ./assess.db:/app/assess.db
    restart: unless-stopped
    command: python -m bot.main

  web:
    build: .
    env_file: .env
    ports:
      - "8899:8899"
    volumes:
      - ./web:/app/web
      - ./core:/app/core
      - ./files:/app/files
      - ./assess.db:/app/assess.db
    restart: unless-stopped
    command: uvicorn web.main:app --host 0.0.0.0 --port 8899
